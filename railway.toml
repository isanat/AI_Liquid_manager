# Railway configuration for AI Engine
# Uses Nixpacks for automatic Python detection

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python -m uvicorn ai-engine.api.main:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[variables]
PYTHONPATH = "/app"
PYTHONUNBUFFERED = "1"
