# Railway configuration for AI Engine
# Uses Dockerfile for build - CMD in Dockerfile handles startup

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.ai"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[variables]
PYTHONPATH = "/app"
PYTHONUNBUFFERED = "1"
