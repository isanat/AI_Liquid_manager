# Nixpacks configuration for Railway (alternative to Dockerfile)
# Used when builder is set to NIXPACKS

[phases.setup]
nixPkgs = ['python311', 'gcc', 'libffi', 'curl']

[phases.install]
cmds = ['pip install --no-cache-dir -r ai_engine/requirements.txt']

[start]
cmd = 'python -m uvicorn ai_engine.api.main:app --host 0.0.0.0 --port ${PORT:-8000}'

[variables]
PYTHONPATH = '/app'
PYTHONUNBUFFERED = '1'
