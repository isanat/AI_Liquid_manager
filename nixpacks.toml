# Nixpacks configuration for Railway
# Used when builder is set to NIXPACKS

[phases.setup]
nixPkgs = ['python311', 'gcc', 'libffi']

[phases.install]
cmds = ['pip install -r ai-engine/requirements.txt']

[start]
cmd = 'python -m uvicorn ai-engine.api.main:app --host 0.0.0.0 --port ${PORT:-8000}'

[variables]
PYTHONPATH = '/app'
PYTHONDONTWRITEBYTECODE = '1'
PYTHONUNBUFFERED = '1'
