# Nixpacks configuration for Railway
# This file tells Railway how to build and run the app

[phases.setup]
nixPkgs = ['python311', 'gcc', 'postgresql', 'redis']

[phases.install]
cmds = ['pip install -r ai-engine/requirements.txt']

[phases.build]
cmds = ['python -c "import lightgbm; print(lightgbm.__version__)"']

[start]
cmd = 'python -m uvicorn ai-engine.api.main:app --host 0.0.0.0 --port $PORT'

[variables]
PYTHONPATH = '/app'
PYTHONDONTWRITEBYTECODE = '1'
