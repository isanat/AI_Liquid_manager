# Render Configuration
# https://render.com/docs/blueprint-spec

services:
  # ============================================
  # AI Engine - Python FastAPI + Keeper Bot
  # ============================================
  - type: web
    name: ai-liquidity-engine
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r ai_engine/requirements.txt
    startCommand: python -m uvicorn ai_engine.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONPATH
        value: /opt/render/project/src

      # ── The Graph API keys ──
      - key: THE_GRAPH_API_KEY
        value: bb60df2c64bb3cfe2c8662b74bcb7276
      - key: THE_GRAPH_API_KEY2
        value: 4406f8139d6b9ab212d613efbd414988

      # ── Smart contract (AILiquidVault on Arbitrum Sepolia) ──
      - key: VAULT_ADDRESS
        value: 0xF9FD652453801749768e5660bbE624Ee90bE39a3

      # ── RPC endpoints ──
      - key: RPC_URL_ARBITRUM
        value: https://arb1.arbitrum.io/rpc
      - key: RPC_URL_ARBITRUM_SEPOLIA
        value: https://sepolia-rollup.arbitrum.io/rpc

      # ── Keeper wallet private key (set manually in Render dashboard — never commit the real value) ──
      - key: KEEPER_PRIVATE_KEY
        sync: false

  # ============================================
  # Frontend - Next.js
  # ============================================
  - type: web
    name: ai-liquidity-frontend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20

      # ── AI engine URL (auto-linked from sibling service) ──
      - key: AI_ENGINE_URL
        fromService:
          name: ai-liquidity-engine
          type: web
          property: url

      # ── The Graph API keys ──
      - key: THE_GRAPH_API_KEY
        value: bb60df2c64bb3cfe2c8662b74bcb7276
      - key: THE_GRAPH_API_KEY2
        value: 4406f8139d6b9ab212d613efbd414988

      # ── Smart contract ──
      - key: NEXT_PUBLIC_VAULT_ADDRESS
        value: 0xF9FD652453801749768e5660bbE624Ee90bE39a3
      - key: NEXT_PUBLIC_CHAIN_ID
        value: "421614"

      # ── WalletConnect ──
      - key: NEXT_PUBLIC_WC_PROJECT_ID
        value: 9a9a4ec5bde3ebded3da0745fbb6cad3

      # ── AI engine public URL (baked at build time — Render resolves fromService) ──
      - key: NEXT_PUBLIC_AI_ENGINE_URL
        fromService:
          name: ai-liquidity-engine
          type: web
          property: url

      # ── RPC (public — pode usar Alchemy para produção) ──
      - key: NEXT_PUBLIC_RPC_ARBITRUM
        value: https://arb1.arbitrum.io/rpc
      - key: NEXT_PUBLIC_RPC_ARBITRUM_SEPOLIA
        value: https://sepolia-rollup.arbitrum.io/rpc

      # ── Arbitrum pool address (ETH/USDC 0.05%) ──
      - key: POOL_ADDRESS
        value: 0xC6962004f452bE9203591991D15f6b388e09E8D0

      # ── Frontend URL (shown in admin system page) ──
      - key: NEXT_PUBLIC_FRONTEND_URL
        fromService:
          name: ai-liquidity-frontend
          type: web
          property: url

      # ── Database (SQLite via Prisma — set DATABASE_URL manually in Render dashboard) ──
      # Example: DATABASE_URL=file:/opt/render/project/src/prisma/prod.db
      - key: DATABASE_URL
        sync: false
