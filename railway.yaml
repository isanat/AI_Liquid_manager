# Railway Configuration
# This file defines all services for the AI Liquidity Manager

services:
  # ============================================
  # Frontend - Next.js Dashboard
  # ============================================
  frontend:
    source:
      repo: isanat/AI_Liquid_manager
      branch: main
    build:
      builder: NIXPACKS
      buildCommand: bun install && bun run build
    deploy:
      startCommand: bun run start
      healthcheckPath: /
      healthcheckTimeout: 300
    variables:
      AI_ENGINE_URL: ${{ai_engine.RAILWAY_PUBLIC_DOMAIN}}
      THE_GRAPH_API_KEY: server_7f90e2479fa2385aa72a55ca3fd847cc
      THE_GRAPH_API_KEY2: servidor_1ed6c55d924ac2041aae14ae78638aa1
      DATABASE_URL: ${{postgres.DATABASE_URL}}
      REDIS_URL: ${{redis.REDIS_URL}}

  # ============================================
  # AI Engine - Python FastAPI
  # ============================================
  ai_engine:
    source:
      repo: isanat/AI_Liquid_manager
      branch: main
    build:
      builder: NIXPACKS
      buildCommand: pip install -r ai_engine/requirements.txt
    deploy:
      startCommand: python -m uvicorn ai_engine.api.main:app --host 0.0.0.0 --port $PORT
      healthcheckPath: /health
      healthcheckTimeout: 300
    variables:
      PYTHONPATH: /app
      THE_GRAPH_API_KEY: server_7f90e2479fa2385aa72a55ca3fd847cc
      THE_GRAPH_API_KEY2: servidor_1ed6c55d924ac2041aae14ae78638aa1
      MODEL_PATH: /app/ai_engine/models/saved
      DATABASE_URL: ${{postgres.DATABASE_URL}}
      REDIS_URL: ${{redis.REDIS_URL}}

  # ============================================
  # Database - PostgreSQL
  # ============================================
  postgres:
    image: postgres:15-alpine
    variables:
      POSTGRES_USER: liquidity
      POSTGRES_PASSWORD: ${{generate(32)}}
      POSTGRES_DB: liquidity_manager
    storage:
      name: postgres-data
      mount: /var/lib/postgresql/data

  # ============================================
  # Cache - Redis
  # ============================================
  redis:
    image: redis:7-alpine
    variables:
      REDIS_PASSWORD: ${{generate(32)}}
    storage:
      name: redis-data
      mount: /data
