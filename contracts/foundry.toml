[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

[rpc_endpoints]
sepolia          = "${RPC_URL_SEPOLIA}"
arbitrum_sepolia = "${RPC_URL_ARBITRUM_SEPOLIA}"
arbitrum_one     = "${RPC_URL_ARBITRUM}"

[etherscan]
arbitrum_sepolia = { key = "${ARBISCAN_API_KEY}", chain = 421614, url = "https://api-sepolia.arbiscan.io/api" }
arbitrum_one     = { key = "${ARBISCAN_API_KEY}", chain = 42161,  url = "https://api.arbiscan.io/api" }
